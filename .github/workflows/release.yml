name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p composeApp/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > composeApp/keystore/release.keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv composeApp/build/outputs/apk/release/composeApp-release.apk \
             composeApp/build/outputs/apk/release/Kaizen-${VERSION}-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/release/Kaizen-*-android.apk

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Create distributable
        run: ./gradlew :composeApp:createDistributable

      - name: Package as tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd composeApp/build/compose/binaries/main/app
          tar -czf "${GITHUB_WORKSPACE}/Kaizen-${VERSION}-linux-x64.tar.gz" *

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: Kaizen-*-linux-x64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Kaizen-*-android.apk
            Kaizen-*-linux-x64.tar.gz
